name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v3
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        cache: true
    
    - name: Create Flutter Project Structure
      run: |
        # 创建临时 Flutter 项目获取原生结构
        cd /tmp
        flutter create -t app temp_project
        # 复制 android 和 ios 目录到项目根目录
        cp -r /tmp/temp_project/android $GITHUB_WORKSPACE/
        cp -r /tmp/temp_project/ios $GITHUB_WORKSPACE/
        # 清理临时项目
        rm -rf /tmp/temp_project
    
    - name: Update Android Configuration
      run: |
        # 更新 AndroidManifest.xml 添加权限
        sed -i '/<\/application>/i \
        <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\
        <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\
        <uses-permission android:name="android.permission.CAMERA"/>' \
        android/app/src/main/AndroidManifest.xml
        
        # 更新应用名称
        sed -i 's/temp_project/video_cleaner/g' android/app/build.gradle
        
        # 更新包名
        sed -i 's/com.example.temp_project/com.videocleaner/g' android/app/build.gradle
        sed -i 's/com.example.temp_project/com.videocleaner/g' android/app/src/main/AndroidManifest.xml
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build APK
      run: |
        flutter config --no-analytics
        flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
